{% extends "base.html" %}
{% block title %}Edit Profile{% endblock %}

{% block content %}

<h2 class="page-title center-title">👤 Edit Profile</h2>

<!-- Success message -->
{% with messages = get_flashed_messages() %}
  {% if messages %}
    <div class="success-msg">
        {{ messages[0] }}
    </div>
  {% endif %}
{% endwith %}

<div class="glass-card predict-card profile-vertical">

    <form method="POST">

        <div class="predict-grid">

            <input type="text" value="{{ session.get('username') }}" disabled>

            <input type="text"
                   name="institute"
                   value="{{ session.get('institute') }}"
                   placeholder="Institute"
                   required>

            <input type="text"
                   name="roll_no"
                   value="{{ session.get('roll_no') }}"
                   placeholder="Roll Number"
                   required>

            <input type="date"
                   name="birth_date"
                   value="{{ session.get('birth_date') }}"
                   required>

        </div>

        <button class="predict-btn" type="submit">
            💾 Save Changes
        </button>

    </form>

</div>

<style>
.success-msg{
    background:#2ecc71;
    color:#fff;
    padding:12px;
    border-radius:8px;
    margin:15px auto;
    width: fit-content;
    text-align:center;
    animation: fadeIn 0.4s ease;
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(-5px)}
    to{opacity:1;transform:translateY(0)}
}

.profile-vertical .predict-grid{
    display: flex;
    flex-direction: column;
    gap: 16px;
}
</style>

{% endblock %}
