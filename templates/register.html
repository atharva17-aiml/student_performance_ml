<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register | Student Performance Predictor</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">

<style>
body{
    min-height:100vh;
    background: linear-gradient(135deg,#1d2671,#c33764);
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Segoe UI, sans-serif;
}
.card-box{
    width:420px;
    background:white;
    border-radius:18px;
    padding:30px;
    box-shadow:0 15px 40px rgba(0,0,0,.3);
}
.register-btn{ background:#16a34a; color:white; }
.register-btn:hover{ background:#15803d; }
</style>
</head>
<body>

<div class="card-box">

<h3 class="text-center mb-2">🎓 Student Performance Predictor</h3>
<p class="text-center text-muted">Create your account</p>

{% if message %}
<div class="alert alert-danger text-center">{{ message }}</div>
{% endif %}

<form method="POST">

<div class="mb-3">
<label>Username</label>
<input class="form-control" name="username" required>
</div>

<div class="mb-3">
<label>Password</label>
<input type="password" class="form-control" name="password" required>
</div>

<div class="mb-3">
<label>Institute</label>
<input class="form-control" name="institute" required>
</div>

<div class="mb-3">
<label>Roll Number</label>
<input class="form-control" name="roll_no" required>
</div>

<div class="mb-3">
<label>Birth Date</label>
<input type="date" class="form-control" name="birth_date" required>
</div>

<button class="btn register-btn w-100">Register</button>

</form>

<div class="text-center mt-3">
Already have an account? <a href="/login">Login</a>
</div>

</div>
</body>
</html>
